<circle cx="553" cy="146" r="5" class="node-on"/>
<circle cx="575" cy="146" r="5" class="node-off"/>
<circle cx="597" cy="146" r="5" class="node-mid"/>

<line x1="450" y1="170" x2="616" y2="170" class="arrow"/>
<text x="532" y="186" class="tag" text-anchor="middle">Gibbs sweep over attributes</text>

<rect x="40" y="68" width="3" height="64" class="accent" rx="1"/>

<text x="56" y="93" class="title">maxent-popsynth-pcd</text>
<text x="56" y="114" class="sub">Scalable Maximum Entropy Population Synthesis</text>
<text x="56" y="130" class="sub">via Persistent Contrastive Divergence</text>
<text x="56" y="155" class="tag">Python · MaxEnt · Gibbs sampling · PCD · K≥50</text>

